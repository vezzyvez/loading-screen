<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Galaxy Gaming — Clone Wars RP</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #02070d;
        }

        .loading-screen {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            user-select: none;
            -webkit-user-drag: none;
        }
    </style>
</head>
<body>
    <img
        class="loading-screen"
        src="loading-screen.png"
        alt="Galaxy Gaming Clone Wars RP loading screen"
    >
</body>
</html>
